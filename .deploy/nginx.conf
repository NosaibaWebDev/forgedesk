# ForgeDesk Studio - Nginx Configuration
# Place in /etc/nginx/sites-available/forgedesk
# Symlink to /etc/nginx/sites-enabled/ to activate

server {
    listen 80;
    listen [::]:80;
    server_name forgedesk.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name forgedesk.example.com;

    root /var/www/forgedesk/public;
    index index.php;

    charset utf-8;

    ssl_certificate     /etc/ssl/certs/forgedesk.pem;
    ssl_certificate_key /etc/ssl/private/forgedesk.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;

    # Prevent access to dot files and sensitive paths
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cache static assets
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|gif|jpe?g|png|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;

        # Rate limiting
        limit_req zone=laravel burst=30 nodelay;
    }

    # Deny access to sensitive files
    location ~* ^/(vendor|storage|bootstrap/cache|database)/.*$ {
        deny all;
    }

    location ~* ^/storage/logs/ {
        deny all;
    }
}

# Rate limiting zones (place in nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=laravel:10m rate=30r/s;
# limit_conn_zone $binary_remote_addr zone=addr:10m;
