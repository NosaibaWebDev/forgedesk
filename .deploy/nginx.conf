# ForgeDesk Studio - Nginx Configuration
# Place in /etc/nginx/sites-available/forgedesk
# Symlink to /etc/nginx/sites-enabled/ to activate
#
# IMPORTANT: The rate limiting zone directive (limit_req_zone) must be placed
# in the http {} block of /etc/nginx/nginx.conf, NOT in this file.
# Add this line inside the http {} block in nginx.conf:
#   limit_req_zone $binary_remote_addr zone=laravel:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name forgedesk.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name forgedesk.example.com;

    root /var/www/forgedesk/public;
    index index.php;

    charset utf-8;

    server_tokens off;

    # SSL - update paths after running certbot, or use certbot --nginx which manages these automatically
    ssl_certificate     /etc/letsencrypt/live/forgedesk.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forgedesk.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent access to dot files and sensitive paths
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cache static assets
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|gif|jpe?g|png|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP-FPM - uses php8.3 (installed by setup.sh)
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;

        # Rate limiting (requires limit_req_zone in http block)
        limit_req zone=laravel burst=30 nodelay;
    }

    # Deny access to sensitive files
    location ~* ^/(vendor|storage|bootstrap/cache|database)/.*$ {
        deny all;
    }
}
